name: 🐞 Bug, problem, error
description: Report an issue, problem, or error in PyFluent.
title: "[BUG]: <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the
        sections below so we can reproduce and resolve the issue quickly.

  - type: checkboxes
    id: prior-search
    attributes:
      label: ✅ Before submitting
      description: Please confirm the following before opening the issue.
      options:
        - label: I have searched the [existing issues](https://github.com/ansys/pyfluent/issues) and did not find a duplicate.
          required: true
        - label: I have read the [PyFluent documentation](https://fluent.docs.pyansys.com/).
          required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Description of the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I call ..., PyFluent raises ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔁 Steps to reproduce
      description: Provide a minimal, self-contained code snippet that reproduces the problem.
      render: python
      placeholder: |
        import ansys.fluent.core as pyfluent
        session = pyfluent.launch_fluent()
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🎯 Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 💥 Actual behavior / traceback
      description: What actually happened? Paste the full traceback if any.
      render: shell
    validations:
      required: true

  - type: input
    id: pyfluent-version
    attributes:
      label: 📦 PyFluent version
      placeholder: e.g. 0.34.0
    validations:
      required: true

  - type: input
    id: fluent-version
    attributes:
      label: 🌀 Ansys Fluent version
      placeholder: e.g. 2025 R2 (25.2)
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: 🐍 Python version
      placeholder: e.g. 3.12.4
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 💻 Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 📌 Additional context
      description: Logs, screenshots, environment details, etc.
